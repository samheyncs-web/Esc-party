<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a12;--surface:#13131f;--card:#1c1c2e;--border:#2a2a40;--teal:#00d4b4;--pink:#ff3d7f;--gold:#ffc947;--red:#ff4444;--white:#f0f0f8;--gray:#6b6b8a}
html,body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:14px 14px 60px}
.header{text-align:center;padding:16px 0 12px}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,6vw,2.6rem);letter-spacing:.05em;background:linear-gradient(135deg,var(--teal),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.header-sub{font-size:.7rem;color:var(--gray);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
.header-nick{font-size:.78rem;color:var(--teal);margin-top:5px;font-weight:600}
.mode-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.mode-badge.party{background:rgba(255,61,127,.15);color:var(--pink);border:1px solid rgba(255,61,127,.3)}
.mode-badge.esc{background:rgba(255,201,71,.15);color:var(--gold);border:1px solid rgba(255,201,71,.3)}
/* Nav */
.nav{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border-radius:12px;padding:3px;border:1px solid var(--border);flex-wrap:wrap}
.nav-btn{flex:1;min-width:52px;padding:8px 4px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--gray);white-space:nowrap}
.nav-btn.active{background:var(--card);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.4)}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;color:var(--teal);margin-bottom:10px}
/* Forms */
input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;width:100%;display:block;margin-bottom:8px}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
input::placeholder,textarea::placeholder{color:var(--gray)}
select option{background:var(--card)}
textarea{resize:none;min-height:60px}
.field label{display:block;font-size:.71rem;color:var(--gray);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:8px}
/* Buttons */
.btn{border:none;border-radius:10px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.86rem;cursor:pointer;transition:all .2s;width:100%;display:block;text-align:center;margin-top:7px}
.btn-teal{background:linear-gradient(135deg,var(--teal),#00a891);color:#000}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e6a800);color:#000}
.btn-red{background:linear-gradient(135deg,var(--red),#cc0000);color:#fff}
.btn-ghost{background:var(--surface);color:var(--gray);border:1px solid var(--border)}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none}
.btn-row{display:flex;gap:7px;margin-top:7px}
.btn-row .btn{flex:1;margin-top:0}
/* Info / alerts */
.info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:.81rem;color:var(--gray);line-height:1.6;margin-bottom:9px}
.info strong{color:var(--white)}
.info-locked{text-align:center;padding:22px;font-weight:600;color:var(--pink);font-size:.88rem}
.alert{padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:600;margin-bottom:10px;text-align:center}
.alert-gold{background:rgba(255,201,71,.15);border:1px solid rgba(255,201,71,.4);color:var(--gold)}
/* Toggles */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:.86rem;font-weight:500}
.toggle-desc{font-size:.71rem;color:var(--gray);margin-top:1px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:.3s}
.toggle-slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--gray);border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--teal)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px);background:#000}
/* Stats */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.stat-row:last-child{border-bottom:none}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--teal)}
/* Progress */
.progress-wrap{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--gray);margin-bottom:3px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));border-radius:2px;transition:width .4s ease}
/* Kat tabs */
.kat-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.kat-tab{padding:4px 7px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--gray);font-size:.7rem;font-weight:600;cursor:pointer;position:relative;font-family:'DM Sans',sans-serif;transition:all .2s}
.kat-tab.ernst.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,180,.1)}
.kat-tab.lustig.active{border-color:var(--pink);color:var(--pink);background:rgba(255,61,127,.1)}
.kat-tab.esc-kat.active{border-color:var(--gold);color:var(--gold);background:rgba(255,201,71,.1)}
.dot{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%}
.kat-header{padding:7px 11px;border-radius:10px;margin-bottom:8px}
.kat-header.ernst{background:rgba(0,212,180,.1);border-left:3px solid var(--teal)}
.kat-header.lustig{background:rgba(255,61,127,.1);border-left:3px solid var(--pink)}
.kat-header.esc-kat{background:rgba(255,201,71,.08);border-left:3px solid var(--gold)}
.kat-label{font-weight:600;font-size:.88rem}
.kat-desc{font-size:.7rem;color:var(--gray);margin-top:1px}
/* Song vote rows — two-line */
.song-vote-row{padding:7px 0;border-bottom:1px solid rgba(42,42,64,.5)}
.song-vote-row:last-child{border-bottom:none}
.song-vote-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.song-vote-bottom{display:flex;justify-content:flex-end;padding-left:26px}
.song-nr{width:19px;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--teal);text-align:center;flex-shrink:0}
.song-name{flex:1;font-size:.83rem;font-weight:500;line-height:1.3;word-break:break-word}
.song-name.own{color:var(--gray);font-style:italic}
.pts-chips{display:flex;gap:3px;flex-wrap:wrap}
.pt-chip{width:31px;height:27px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--gray);font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.pt-chip:hover:not(.taken){border-color:var(--teal);color:var(--teal)}
.pt-chip.selected{background:var(--teal);border-color:var(--teal);color:#000}
.pt-chip.taken{opacity:.2;cursor:not-allowed}
.own-tag{font-size:.66rem;color:var(--pink);background:rgba(255,61,127,.1);border:1px solid rgba(255,61,127,.25);border-radius:4px;padding:2px 6px;flex-shrink:0}
.pts-legend{display:flex;gap:3px;margin-bottom:7px;flex-wrap:wrap;justify-content:flex-end}
.pts-legend-chip{min-width:29px;height:19px;border-radius:4px;padding:0 3px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;font-family:'DM Sans',sans-serif}
/* Running order */
.ro-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.ro-row:last-child{border-bottom:none}
.ro-nr{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--teal);flex-shrink:0}
.ro-info{flex:1;min-width:0}
.ro-title{font-weight:600;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ro-url{font-size:.7rem;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Results */
.tabs{display:flex;gap:5px;margin-bottom:11px}
.tab{flex:1;padding:7px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--gray);font-size:.73rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,180,.08)}
.rank-row{display:flex;align-items:center;gap:9px;padding:7px 11px;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-medal{font-size:1rem;width:24px;text-align:center;flex-shrink:0}
.rank-song{flex:1;min-width:0}
.rank-song-name{font-weight:600;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--pink));margin-top:3px}
.rank-pts{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--gold);flex-shrink:0}
.kat-result{margin-bottom:9px}
.kat-result-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 11px;border-radius:8px 8px 0 0;gap:7px}
.kat-result-hdr.ernst{background:rgba(0,212,180,.15)}
.kat-result-hdr.lustig{background:rgba(255,61,127,.15)}
.kat-result-hdr.esc-kat{background:rgba(255,201,71,.12)}
.kat-result-name{font-weight:600;font-size:.85rem;flex-shrink:0}
.kat-result-winner{font-size:.71rem;color:var(--gold);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kat-result-rows{background:var(--surface);border-radius:0 0 8px 8px}
.kat-result-row{display:flex;align-items:center;gap:7px;padding:6px 11px;border-bottom:1px solid var(--border)}
.kat-result-row:last-child{border-bottom:none}
.kat-result-rank{width:17px;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gray);text-align:center;flex-shrink:0}
.kat-result-song{flex:1;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kat-bar-wrap{width:50px;flex-shrink:0}
.kat-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--pink))}
.kat-result-pts{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--teal);flex-shrink:0}
/* Bingo */
.bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:12px}
.bingo-cell{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:5px 3px;text-align:center;font-size:.62rem;line-height:1.3;cursor:pointer;transition:all .2s;min-height:56px;display:flex;align-items:center;justify-content:center;font-weight:500;color:var(--gray)}
.bingo-cell.marked{background:var(--teal);border-color:var(--teal);color:#000;font-weight:700}
.bingo-cell.free{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.bingo-cell.bingo-line{background:var(--pink);border-color:var(--pink);color:#fff;font-weight:700}
.bingo-announce{background:linear-gradient(135deg,var(--pink),var(--gold));color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;text-align:center;padding:12px;border-radius:12px;margin-bottom:12px;animation:pulse-bg 1s ease-in-out infinite}
@keyframes pulse-bg{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}
/* Comments */
.comment-list{max-height:300px;overflow-y:auto;margin-bottom:10px}
.comment-item{padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.comment-item:last-child{border-bottom:none}
.comment-nick{font-size:.73rem;font-weight:700;color:var(--teal);flex-shrink:0}
.comment-text{font-size:.82rem;flex:1;word-break:break-word}
.comment-time{font-size:.65rem;color:var(--gray);flex-shrink:0;margin-top:2px}
.comment-input-row{display:flex;gap:7px}
.comment-input-row input{margin-bottom:0;flex:1}
.comment-input-row button{flex-shrink:0;margin-top:0;width:auto;padding:9px 14px}
/* Predictions */
.pred-row{padding:8px 0;border-bottom:1px solid var(--border)}
.pred-row:last-child{border-bottom:none}
.pred-label{font-size:.78rem;font-weight:600;margin-bottom:5px}
.pred-options{display:flex;gap:5px;flex-wrap:wrap}
.pred-opt{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--gray);font-size:.73rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.pred-opt.selected{border-color:var(--teal);color:var(--teal);background:rgba(0,212,180,.1)}
.pred-input{margin-bottom:0;margin-top:5px}
/* Drinking game */
.drink-section{margin-bottom:14px}
.drink-section-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--gold);letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.drink-rule{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(42,42,64,.4);font-size:.81rem;line-height:1.5}
.drink-rule:last-child{border-bottom:none}
.drink-amount{flex-shrink:0;font-weight:700;color:var(--teal);font-size:.78rem;min-width:36px}
/* Info/Help content */
.help-section{margin-bottom:16px}
.help-section-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--teal);letter-spacing:.06em;margin-bottom:8px}
.help-step{display:flex;gap:10px;margin-bottom:8px;font-size:.82rem;line-height:1.55}
.help-step-nr{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#000;font-weight:700;font-size:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.help-step-text strong{color:var(--white)}
.help-chip{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1px 7px;font-size:.72rem;font-weight:600;margin:1px}
/* Mode selector */
.mode-selector{display:flex;gap:7px;margin-bottom:10px}
.mode-opt{flex:1;padding:11px 8px;border-radius:12px;border:2px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;transition:all .2s}
.mode-opt.selected.party{border-color:var(--pink);background:rgba(255,61,127,.08)}
.mode-opt.selected.esc{border-color:var(--gold);background:rgba(255,201,71,.08)}
.mode-opt-icon{font-size:1.4rem;margin-bottom:3px}
.mode-opt-label{font-weight:700;font-size:.82rem}
.mode-opt-desc{font-size:.69rem;color:var(--gray);margin-top:1px}
.host-song-input{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.host-song-input .song-nr{flex-shrink:0}
.host-song-input input{margin-bottom:0;flex:1}
/* Playlist box */
.playlist-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:.7rem;color:var(--teal);word-break:break-all;font-family:monospace;margin-bottom:7px}
/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--teal);color:var(--white);padding:9px 18px;border-radius:10px;font-size:.81rem;font-weight:500;z-index:9999;animation:fadeup .3s ease;white-space:nowrap;max-width:90vw;text-align:center}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.spinner{text-align:center;padding:50px;color:var(--gray)}
</style>
</head>

async function init(){

  if(saved){ try{ const {n,p}=JSON.parse(saved); await tryLogin(n,p,true); }catch(e){} }

async function loadAll(){
  try{
    const [{data:sd},{data:ud},{data:cd},{data:bd}] = await Promise.all([
      sb.from("esc_state").select("*").eq("id",1).maybeSingle(),
      sb.from("esc_users").select("id,nickname,song_title,youtube_url,ballot,has_voted,predictions"),
      sb.from("esc_comments").select("*").order("created_at",{ascending:true}).limit(200),
      sb.from("esc_bingos").select("*").order("created_at",{ascending:true}),
    ]);
    if(sd) appState={...appState,...sd,visibility:{...DEFAULT_VIS,...(sd.visibility||{})}};
    if(ud) allUsers=ud;
    if(cd) allComments=cd;
    if(bd) allBingos=bd;
    if(currentUser){ const f=allUsers.find(u=>u.id===currentUser.id); if(f) currentUser={...currentUser,...f}; }
  }catch(e){console.error(e);}
}

function subscribeRealtime(){
  if(channel) sb.removeChannel(channel);
  channel = sb.channel("esc-rt-v2")
    .on("postgres_changes",{event:"*",schema:"public",table:"esc_state"},  async()=>{await loadAll();render();})
    .on("postgres_changes",{event:"*",schema:"public",table:"esc_users"},  async()=>{await loadAll();render();})
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"esc_comments"},async()=>{await loadAll();render();})
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"esc_bingos"},  async()=>{await loadAll();render();})
    .subscribe();
}

function hashPin(p){ let h=0; for(const c of String(p)) h=(h*31+c.charCodeAt(0))&0xffffffff; return h.toString(16); }

async function tryLogin(nick,pin,silent=false){
  nick=(nick||"").trim();
  if(!nick||!pin||String(pin).length!==4){ if(!silent) showToast("Nickname und 4-stellige PIN eingeben."); return false; }
  const {data:ex}=await sb.from("esc_users").select("*").eq("nickname_lower",nick.toLowerCase()).maybeSingle();
  if(ex){
    if(ex.pin_hash!==hashPin(pin)){ if(!silent) showToast("Falsche PIN für diesen Nickname."); return false; }
    currentUser=ex;
  } else {
    if(silent) return false;
    const {data:cr,error}=await sb.from("esc_users").insert({
      nickname:nick,nickname_lower:nick.toLowerCase(),pin_hash:hashPin(pin),
      song_title:null,youtube_url:null,ballot:null,has_voted:false,predictions:null
    }).select().single();
    if(error){ if(!silent) showToast("Nickname vergeben – anderen Namen oder PIN versuchen."); return false; }
    currentUser=cr; allUsers.push(cr);
  }
  localStorage.setItem("esc_user",JSON.stringify({n:nick,p:pin}));
  if(!silent) showToast("Willkommen, "+currentUser.nickname+"! 🎤");
  _ballot = currentUser.ballot ? JSON.parse(JSON.stringify(currentUser.ballot)) : {};
  _predictions = currentUser.predictions ? JSON.parse(JSON.stringify(currentUser.predictions)) : {};
  activeNav="info"; return true;
}

async function saveState(partial){
  const merged={...appState,...partial,visibility:{...appState.visibility,...(partial.visibility||{})}};
  await sb.from("esc_state").upsert({id:1,...merged});
  appState=merged;
}
function getMode(){ return appState.mode||"party"; }
function getSongCount(){ return Math.max(5,Number(appState.song_count)||8); }
function getKategorien(){ return getMode()==="esc" ? KATEGORIEN_ESC : KATEGORIEN; }
function calcPointScale(n){
  const full=[12,10,8,7,6,5,4,3,2,1];
  if(n>=10) return full;
  if(n<=0)  return [];
  const priority=[12,10,8,1,3,4,6,7,2,5];
  return priority.slice(0,n).sort((a,b)=>b-a);
}
function getPointScale(excludeOwn){
  const n=getSongCount()-(excludeOwn?1:0);
  return calcPointScale(n);
}

// ── Utils ─────────────────────────────────────────────────────────────────
function extractYtId(url){ if(!url) return null; const m=url.match(/(?:youtu\.be\/|[?&]v=|\/embed\/)([A-Za-z0-9_-]{11})/); return m?m[1]:null; }
function showToast(msg){ document.querySelectorAll(".toast").forEach(e=>e.remove()); const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2800); }
function copyToClipboard(text){ navigator.clipboard.writeText(text).then(()=>showToast("Link kopiert!")); }
function setNav(id){ activeNav=id; render(); }
function setKat(i){ activeKat=i; render(); }
function setResultTab(t){ resultTab=t; render(); }
function fmtTime(iso){ const d=new Date(iso); return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); }
function calcResults(){
  const songs=appState.running_order||[];
  const kats=getKategorien();
  const totals={},byKat={};
  kats.forEach(k=>{byKat[k.id]={};songs.forEach((_,i)=>byKat[k.id][i]=0);});
  songs.forEach((_,i)=>totals[i]=0);
  allUsers.filter(u=>u.ballot).forEach(u=>{
    Object.entries(u.ballot||{}).forEach(([katId,sm])=>{
      Object.entries(sm||{}).forEach(([sidx,pts])=>{
        if(byKat[katId]){byKat[katId][sidx]=(byKat[katId][sidx]||0)+Number(pts);totals[sidx]=(totals[sidx]||0)+Number(pts);}
      });
    });
  });
  return{byKat,totals,songs,kats};
}
function getPlaylistUrl(){
  const ids=(appState.running_order||[]).map(s=>extractYtId(s.youtube_url)).filter(Boolean);
  return ids.length?"https://www.youtube.com/watch_videos?video_ids="+ids.join(","):null;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root"); if(!root) return;
  if(!currentUser&&!isHost){root.innerHTML=renderLogin();return;}
  const vis=appState.visibility;
  const hasRO=(appState.running_order||[]).length>0;
  const mode=getMode();

  // Build nav
  let navItems=[{id:"info",label:"ℹ️ Info"}];
  if(!isHost){
    if(mode==="party"&&(vis.submit||currentUser?.song_title)) navItems.push({id:"song",label:"🎵 Song"});
    if(vis.running_order&&hasRO) navItems.push({id:"order",label:"📋 Order"});
    if(vis.predictions) navItems.push({id:"pred",label:"🔮 Tipps"});
    if(vis.voting&&hasRO) navItems.push({id:"vote",label:"🗳 Voting"});
    if(vis.results) navItems.push({id:"results",label:"🏆 Ergebnisse"});
    if(vis.bingo&&mode==="esc") navItems.push({id:"bingo",label:"🎯 Bingo"});
    if(vis.comments) navItems.push({id:"comments",label:"💬 Chat"});
    if(vis.drinking) navItems.push({id:"drinking",label:"🍺 Trinken"});
  } else {
    navItems=[{id:"info",label:"ℹ️ Info"},{id:"panel",label:"👑 Panel"},{id:"order",label:"📋 Order"},{id:"results",label:"🏆 Ergebnisse"},{id:"bingo",label:"🎯 Bingo"},{id:"pred",label:"🔮 Tipps"}];
  }
  if(!navItems.find(n=>n.id===activeNav)) activeNav=navItems[0]?.id||"info";
  const navHtml=navItems.map(n=>`<button class="nav-btn ${activeNav===n.id?"active":""}" onclick="setNav('${n.id}')">${n.label}</button>`).join("");

  let content="";
  if(isHost){
    if(activeNav==="info")    content=renderHelp(true);
    if(activeNav==="panel")   content=renderHostPanel();
    if(activeNav==="order")   content=renderRunningOrder(true);
    if(activeNav==="results") content=renderResults();
    if(activeNav==="bingo")   content=renderBingoAdmin();
    if(activeNav==="pred")    content=renderPredictionsAdmin();
  } else {
    if(activeNav==="info")     content=renderHelp(false);
    if(activeNav==="song")     content=renderSongSubmit();
    if(activeNav==="order")    content=renderRunningOrder(false);
    if(activeNav==="pred")     content=renderPredictions();
    if(activeNav==="vote")     content=renderVoting();
    if(activeNav==="results")  content=renderResults();
    if(activeNav==="bingo")    content=renderBingo();
    if(activeNav==="comments") content=renderComments();
    if(activeNav==="drinking") content=renderDrinking();
  }

  const modeBadge=mode==="esc"?`<div><span class="mode-badge esc">🌍 ESC-Modus</span></div>`:`<div><span class="mode-badge party">🎉 Party-Modus</span></div>`;
  root.innerHTML=`<div class="app">
    <div class="header">
      <div class="header-title">🎤 ${mode==="esc"?"ESC":"Alternative ESC"} Voting</div>
      <div class="header-sub">Voting System</div>
      ${modeBadge}
      ${currentUser?`<div class="header-nick">${currentUser.nickname} · <a href="#" onclick="logout();return false;" style="color:var(--gray);font-size:.7rem">Abmelden</a></div>`:""}
      ${isHost?`<div class="header-nick" style="color:var(--gold)">👑 Host · <a href="#" onclick="isHost=false;render();return false;" style="color:var(--gray);font-size:.7rem">Beenden</a></div>`:""}
    </div>
    <div class="nav">${navHtml}</div>
    ${content}
  </div>`;

  // Re-attach comment input state
  const ci=document.getElementById("comment-input");
  if(ci){ ci.value=_localComment; ci.oninput=e=>_localComment=e.target.value; ci.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();postComment();}}; }
}

// ── VOTING ────────────────────────────────────────────────────────────────
function renderVoting(){
  const vis=appState.visibility;
  const ro=appState.running_order||[];
  const mode=getMode();
  if(!vis.voting) return `<div class="card"><div class="info-locked">🔒 Abstimmung ist noch nicht geöffnet.</div></div>`;
  if(!ro.length)  return `<div class="card"><div class="info">Keine Songs in der Running Order.</div></div>`;
  if(!_ballot) _ballot=currentUser?.ballot?JSON.parse(JSON.stringify(currentUser.ballot)):{};
  if(currentUser?.has_voted&&!_editingVote){
    return `<div class="card" style="text-align:center;padding:24px 14px">
      <div style="font-size:2.2rem;margin-bottom:8px">✅</div>
      <div style="font-weight:600;font-size:.95rem;margin-bottom:5px">Stimme abgegeben!</div>
      <div style="color:var(--gray);font-size:.8rem">Warte auf die Ergebnisse vom Host.</div>
      <div style="color:var(--gray);font-size:.7rem;margin-top:5px">${allUsers.filter(u=>u.has_voted).length} von ${allUsers.length} haben abgestimmt</div>
      <button class="btn btn-ghost" style="margin-top:12px" onclick="_editingVote=true;render()">Stimme ändern</button>
    </div>`;
  }
  const kats=getKategorien();
  if(activeKat>=kats.length) activeKat=0;
  const ownIdx=mode==="party"?ro.findIndex(s=>currentUser?.song_title&&s.title===currentUser.song_title&&s.youtube_url===currentUser.youtube_url):-1;
  const hasOwn=ownIdx>=0;
  const pts=getPointScale(hasOwn);
  const kat=kats[activeKat];
  const katBallot=_ballot[kat.id]||{};
  const used=new Set(Object.values(katBallot));
  const needed=pts.length;
  const filledKats=kats.filter(k=>{
    const assigned=Object.keys(_ballot[k.id]||{}).filter(idx=>String(idx)!==String(ownIdx));
    return assigned.length>=needed;
  }).length;
  const katTabs=kats.map((k,i)=>{
    const assigned=Object.keys(_ballot[k.id]||{}).filter(idx=>String(idx)!==String(ownIdx)).length;
    const dotColor=assigned>=needed?"var(--teal)":assigned>0?"var(--gold)":"";
    return `<button class="kat-tab ${k.gruppe} ${i===activeKat?"active":""}" onclick="setKat(${i})">${k.id}${dotColor?`<span class="dot" style="background:${dotColor}"></span>`:""}</button>`;
  }).join("");
  const legend=pts.map(p=>{const u=used.has(p);return `<div class="pts-legend-chip" style="color:${u?(p===12?"var(--gold)":"var(--teal)"):"var(--gray)"};text-decoration:${u?"line-through":"none"}">${p}</div>`;}).join("");
  const songRows=ro.map((s,i)=>{
    const isOwn=i===ownIdx;
    const assigned=katBallot[i];
    if(isOwn) return `<div class="song-vote-row"><div class="song-vote-top"><div class="song-nr">${i+1}</div><div class="song-name own">${s.title}</div><span class="own-tag">dein Song</span></div></div>`;
    const chips=pts.map(p=>{
      const sel=assigned===p,taken=!sel&&used.has(p);
      return `<button class="pt-chip ${sel?"selected":""} ${taken?"taken":""}" onclick="${taken?"":"toggleChip('"+kat.id+"',"+i+","+p+")"}">${p}</button>`;
    }).join("");
    return `<div class="song-vote-row"><div class="song-vote-top"><div class="song-nr">${i+1}</div><div class="song-name">${s.title}</div></div><div class="song-vote-bottom"><div class="pts-chips">${chips}</div></div></div>`;
  }).join("");
  const canSubmit=kats.every(k=>Object.keys(_ballot[k.id]||{}).filter(idx=>String(idx)!==String(ownIdx)).length>=needed);
  return `
  <div class="progress-wrap">
    <div class="progress-label"><span>Kategorien ausgefüllt</span><span>${filledKats} / ${kats.length}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(filledKats/kats.length)*100}%"></div></div>
  </div>
  ${kats.length>1?`<div class="kat-tabs">${katTabs}</div>`:""}
  <div class="card">
    <div class="kat-header ${kat.gruppe}"><div class="kat-label">${kat.emoji} ${kat.label}</div><div class="kat-desc">${kat.desc}</div></div>
    <div class="pts-legend">${legend}</div>
    ${songRows}
  </div>
  <button class="btn btn-teal" ${canSubmit?"":"disabled"} onclick="${canSubmit?"doSubmitVote()":""}">
    ${canSubmit?"Abstimmen ✅":"Noch "+(kats.length-filledKats)+" Kategorie(n) ausfüllen…"}
  </button>
  <div style="font-size:.7rem;color:var(--gray);text-align:center;margin-top:7px">${allUsers.filter(u=>u.has_voted).length} von ${allUsers.length} haben abgestimmt</div>`;
}

// ── RESULTS ───────────────────────────────────────────────────────────────
function renderResults(){
  const vis=appState.visibility;
  if(!isHost&&!vis.results) return `<div class="card"><div class="info-locked">🔒 Ergebnisse noch nicht freigegeben.</div></div>`;
  const {byKat,totals,songs,kats}=calcResults();
  if(!songs.length) return `<div class="card"><div class="info">Keine Songs vorhanden.</div></div>`;
  const ranked=Object.entries(totals).map(([idx,pts])=>({idx:Number(idx),pts,name:songs[idx]?.title||"?"})).sort((a,b)=>b.pts-a.pts);
  const maxPts=ranked[0]?.pts||1;
  const mode=getMode();
  const showKatTabs=mode==="party"&&kats.length>1;
  let tabs="";
  if(showKatTabs) tabs=`<div class="tabs"><div class="tab ${resultTab==="gesamt"?"active":""}" onclick="setResultTab('gesamt')">🏆 Gesamt</div><div class="tab ${resultTab==="ernst"?"active":""}" onclick="setResultTab('ernst')">⭐ Ernst</div><div class="tab ${resultTab==="lustig"?"active":""}" onclick="setResultTab('lustig')">😂 Lustig</div></div>`;
  let content="";
  if(!showKatTabs||resultTab==="gesamt"){
    const rows=ranked.map((r,i)=>`<div class="rank-row"><div class="rank-medal">${MEDALS[i]||i+1+"."}</div><div class="rank-song"><div class="rank-song-name">${r.name}</div><div class="rank-bar" style="width:${(r.pts/maxPts)*100}%"></div></div><div class="rank-pts">${r.pts}</div></div>`).join("");
    const v=allUsers.filter(u=>u.has_voted).length;
    content=`<div class="card">${rows}<div style="font-size:.7rem;color:var(--gray);text-align:center;margin-top:9px">${v} Stimmzettel</div></div>`;
  } else {
    content=kats.filter(k=>k.gruppe===resultTab).map(kat=>{
      const scores=Object.entries(byKat[kat.id]||{}).map(([idx,pts])=>({idx:Number(idx),pts,name:songs[idx]?.title||"?"})).sort((a,b)=>b.pts-a.pts);
      const top=scores[0]?.pts||1;
      return `<div class="kat-result"><div class="kat-result-hdr ${kat.gruppe}"><span class="kat-result-name">${kat.emoji} ${kat.label}</span>${scores[0]?`<span class="kat-result-winner">🏆 ${scores[0].name}</span>`:""}</div><div class="kat-result-rows">${scores.map((s,i)=>`<div class="kat-result-row"><div class="kat-result-rank">${MEDALS[i]||i+1+"."}</div><div class="kat-result-song">${s.name}</div><div class="kat-bar-wrap"><div class="kat-bar" style="width:${(s.pts/top)*100}%"></div></div><div class="kat-result-pts">${s.pts}</div></div>`).join("")}</div></div>`;
    }).join("");
  }
  return tabs+content;
}

// init called below

// ── REVEAL SYSTEM ─────────────────────────────────────────────────────────
async function hostStartReveal(){
  if(!confirm("Ergebnisverkündung starten? Gäste sehen erst was du aufdeckst.")) return;
  await saveState({reveal_state:{active:true,katIdx:0,songIdx:-1,phase:"kat"}});
  activeNav="reveal"; render();
}

async function hostRevealNext(){
  const {byKat,totals,songs,kats}=calcResults();
  const rs=appState.reveal_state||{katIdx:0,songIdx:-1,phase:"kat"};
  if(rs.phase==="kat"){
    if(rs.songIdx<songs.length-1){
      await saveState({reveal_state:{...rs,songIdx:rs.songIdx+1}});
    } else if(rs.katIdx<kats.length-1){
      await saveState({reveal_state:{...rs,katIdx:rs.katIdx+1,songIdx:-1}});
    } else {
      await saveState({reveal_state:{...rs,phase:"gesamt",songIdx:-1}});
    }
  } else if(rs.phase==="gesamt"){
    if(rs.songIdx<songs.length-1){
      await saveState({reveal_state:{...rs,songIdx:rs.songIdx+1}});
    } else {
      await saveState({reveal_state:{...rs,phase:"done"}});
    }
  }
  render();
}

async function hostEndReveal(){
  await saveState({reveal_state:{active:false,katIdx:0,songIdx:-1,phase:"kat"}});
  activeNav="results"; render();
}

function buildRevealScreen(){
  const {byKat,totals,songs,kats}=calcResults();
  const rs=appState.reveal_state||{active:false,katIdx:0,songIdx:-1,phase:"kat"};
  if(!rs.active) return `<div class="card"><div class="info-locked">⏳ Die Ergebnisse werden gleich verkündet…</div></div>`;
  const isGesamt=rs.phase==="gesamt"||rs.phase==="done";
  const isDone=rs.phase==="done";
  const MEDALS_R=["🥇","🥈","🥉","4.","5.","6.","7.","8.","9.","10.","11.","12."];

  if(!isGesamt){
    const kat=kats[rs.katIdx];
    if(!kat) return "";
    const sorted=Object.entries(byKat[kat.id]||{}).map(([idx,pts])=>({idx:Number(idx),pts,name:songs[idx]?.title||"?"})).sort((a,b)=>a.pts-b.pts);
    const revealed=sorted.slice(0,Math.max(0,rs.songIdx+1));
    const maxPts=sorted[sorted.length-1]?.pts||1;
    return `<div style="padding:16px">
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.2em;color:var(--gray)">KATEGORIE ${rs.katIdx+1} / ${kats.length}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,5vw,2.2rem);background:linear-gradient(135deg,var(--teal),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin:5px 0">${kat.emoji} ${kat.label}</div>
        <div style="font-size:.75rem;color:var(--gray)">${kat.desc}</div>
      </div>
      ${rs.songIdx<0?`<div style="text-align:center;padding:30px;color:var(--gray);font-size:.85rem;font-style:italic">Gleich geht's los…</div>`
        :[...revealed].reverse().map((s,i)=>{
          const isTop=i===0;
          const pct=(s.pts/maxPts)*100;
          return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="width:24px;text-align:center;font-size:${isTop?"1.1rem":".85rem"}">${isTop?"✨":""}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:${isTop?".95rem":".82rem"};color:${isTop?"var(--white)":"var(--gray)"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
              <div style="height:3px;border-radius:2px;margin-top:3px;background:${isTop?"linear-gradient(90deg,var(--teal),var(--pink))":"var(--border)"};width:${pct}%"></div>
            </div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:${isTop?"1.5rem":"1rem"};color:${isTop?"var(--gold)":"var(--gray)"}">${s.pts}</div>
          </div>`;
        }).join("")
      }
    </div>`;
  } else {
    const sorted=Object.entries(totals).map(([idx,pts])=>({idx:Number(idx),pts,name:songs[idx]?.title||"?"})).sort((a,b)=>a.pts-b.pts);
    const revealed=sorted.slice(0,Math.max(0,rs.songIdx+1));
    const maxPts=sorted[sorted.length-1]?.pts||1;
    return `<div style="padding:16px">
      <div style="text-align:center;margin-bottom:18px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.2em;color:var(--gray)">FINALE</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);color:var(--gold);line-height:1.1;margin:5px 0">🏆 GESAMTRANKING</div>
      </div>
      ${rs.songIdx<0?`<div style="text-align:center;padding:30px;color:var(--gray);font-style:italic">Und der Gesamtsieger ist…</div>`
        :[...revealed].reverse().map((s,i)=>{
          const isTop=i===0;
          const rank=sorted.length-revealed.length+(revealed.length-1-i);
          const medal=isDone?MEDALS_R[sorted.length-1-rank]:(isTop?"✨":"");
          const pct=(s.pts/maxPts)*100;
          return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
            <div style="width:24px;text-align:center;font-size:${isTop?"1.1rem":".85rem"}">${medal}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:${isTop?".95rem":".82rem"};color:${isTop?"var(--white)":"var(--gray)"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
              <div style="height:3px;border-radius:2px;margin-top:3px;background:${isTop?"linear-gradient(90deg,var(--gold),var(--pink))":"var(--border)"};width:${pct}%"></div>
            </div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:${isTop?"1.5rem":"1rem"};color:${isTop?"var(--gold)":"var(--gray)"}">${s.pts}</div>
          </div>`;
        }).join("")
      }
    </div>`;
  }
}

// ── PATCHED RENDER ────────────────────────────────────────────────────────
render = function(){
  const root=document.getElementById("root"); if(!root) return;
  if(!currentUser&&!isHost){root.innerHTML=renderLogin();return;}
  const rs=appState.reveal_state||{active:false};
  const vis=appState.visibility;
  const hasRO=(appState.running_order||[]).length>0;
  const mode=getMode();
  let navItems=[{id:"info",label:"ℹ️ Info"}];
  if(!isHost){
    if(mode==="party"&&(vis.submit||currentUser?.song_title)) navItems.push({id:"song",label:"🎵 Song"});
    if(vis.running_order&&hasRO) navItems.push({id:"order",label:"📋 Order"});
    if(vis.predictions) navItems.push({id:"pred",label:"🔮 Tipps"});
    if(vis.voting&&hasRO) navItems.push({id:"vote",label:"🗳 Voting"});
    if(rs.active) navItems.push({id:"reveal_watch",label:"🎭 Ergebnisse"});
    else if(vis.results) navItems.push({id:"results",label:"🏆 Ergebnisse"});
    if(vis.bingo&&mode==="esc") navItems.push({id:"bingo",label:"🎯 Bingo"});
    if(vis.comments) navItems.push({id:"comments",label:"💬 Chat"});
    if(vis.drinking) navItems.push({id:"drinking",label:"🍺 Trinken"});
  } else {
    navItems=[{id:"info",label:"ℹ️ Info"},{id:"panel",label:"👑 Panel"},{id:"order",label:"📋 Order"},{id:"results",label:"🏆 Ergebnisse"},{id:"reveal",label:"🎭 Verkünden"},{id:"bingo",label:"🎯 Bingo"},{id:"pred",label:"🔮 Tipps"}];
  }
  if(!navItems.find(n=>n.id===activeNav)) activeNav=navItems[0]?.id||"info";
  const navHtml=navItems.map(n=>`<button class="nav-btn ${activeNav===n.id?"active":""}" onclick="setNav('${n.id}')">${n.label}</button>`).join("");
  let content="";
  if(isHost){
    if(activeNav==="info")    content=renderHelp(true);
    if(activeNav==="panel")   content=renderHostPanel();
    if(activeNav==="order")   content=renderRunningOrder(true);
    if(activeNav==="results") content=renderResults();
    if(activeNav==="reveal")  content=buildRevealHostPanel()+buildRevealScreen();
    if(activeNav==="bingo")   content=renderBingoAdmin();
    if(activeNav==="pred")    content=renderPredictionsAdmin();
  } else {
    if(activeNav==="info")         content=renderHelp(false);
    if(activeNav==="song")         content=renderSongSubmit();
    if(activeNav==="order")        content=renderRunningOrder(false);
    if(activeNav==="pred")         content=renderPredictions();
    if(activeNav==="vote")         content=renderVoting();
    if(activeNav==="results")      content=renderResults();
    if(activeNav==="reveal_watch") content=buildRevealScreen();
    if(activeNav==="bingo")        content=renderBingo();
    if(activeNav==="comments")     content=renderComments();
    if(activeNav==="drinking")     content=renderDrinking();
  }
  const modeBadge=mode==="esc"?`<div><span class="mode-badge esc">🌍 ESC-Modus</span></div>`:`<div><span class="mode-badge party">🎉 Party-Modus</span></div>`;
  root.innerHTML=`<div class="app">
    <div class="header">
      <div class="header-title">🎤 ${mode==="esc"?"ESC":"Alternative ESC"} Voting</div>
      <div class="header-sub">Voting System</div>
      ${modeBadge}
      ${currentUser?`<div class="header-nick">${currentUser.nickname} · <a href="#" onclick="logout();return false;" style="color:var(--gray);font-size:.7rem">Abmelden</a></div>`:""}
      ${isHost?`<div class="header-nick" style="color:var(--gold)">👑 Host · <a href="#" onclick="isHost=false;render();return false;" style="color:var(--gray);font-size:.7rem">Beenden</a></div>`:""}
    </div>
    <div class="nav">${navHtml}</div>
    ${content}
  </div>`;
  const ci=document.getElementById("comment-input");
  if(ci){ci.value=_localComment;ci.oninput=e=>_localComment=e.target.value;ci.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();postComment();}};}
};

function buildRevealHostPanel(){
  const rs=appState.reveal_state||{active:false};
  const {kats,songs}=calcResults();
  const isDone=rs.phase==="done";
  const isGesamt=rs.phase==="gesamt"||isDone;
  let statusText="";
  if(!rs.active) statusText="Nicht aktiv";
  else if(isDone) statusText="✅ Fertig!";
  else if(isGesamt) statusText=`🏆 Gesamt — ${Math.max(0,rs.songIdx+1)} / ${songs.length} aufgedeckt`;
  else statusText=`Kategorie ${rs.katIdx+1}/${kats.length} — ${Math.max(0,rs.songIdx+1)}/${songs.length} Songs`;
  return `<div class="card" style="margin-bottom:10px">
    <div class="card-title">🎭 Steuerung</div>
    <div style="font-size:.82rem;color:var(--gray);margin-bottom:10px">${statusText}</div>
    ${!isDone
      ? `<button class="btn btn-gold" onclick="hostRevealNext()" style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em">▶ NÄCHSTER SCHRITT</button>`
      : `<div class="alert alert-gold">✅ Alle Ergebnisse verkündet!</div>`
    }
    <button class="btn btn-ghost" style="margin-top:6px" onclick="hostEndReveal()">Verkündung beenden</button>
    <div style="font-size:.72rem;color:var(--gray);margin-top:8px;text-align:center">👁 Screenshare diesen Tab auf den TV — Gäste sehen die Ansicht unten live</div>
  </div>`;
}
