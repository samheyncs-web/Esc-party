<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🎤 ESC Voting</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a12;--surface:#13131f;--card:#1c1c2e;--border:#2a2a40;--teal:#00d4b4;--pink:#ff3d7f;--gold:#ffc947;--red:#ff4444;--white:#f0f0f8;--gray:#6b6b8a}
html,body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:14px 14px 60px}
.header{text-align:center;padding:16px 0 12px}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,6vw,2.6rem);letter-spacing:.05em;background:linear-gradient(135deg,var(--teal),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.header-sub{font-size:.7rem;color:var(--gray);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
.header-nick{font-size:.78rem;color:var(--teal);margin-top:5px;font-weight:600}
.mode-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.mode-badge.party{background:rgba(255,61,127,.15);color:var(--pink);border:1px solid rgba(255,61,127,.3)}
.mode-badge.esc{background:rgba(255,201,71,.15);color:var(--gold);border:1px solid rgba(255,201,71,.3)}
/* Nav */
.nav{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border-radius:12px;padding:3px;border:1px solid var(--border);flex-wrap:wrap}
.nav-btn{flex:1;min-width:52px;padding:8px 4px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--gray);white-space:nowrap}
.nav-btn.active{background:var(--card);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.4)}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;color:var(--teal);margin-bottom:10px}
/* Forms */
input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;width:100%;display:block;margin-bottom:8px}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
input::placeholder,textarea::placeholder{color:var(--gray)}
select option{background:var(--card)}
textarea{resize:none;min-height:60px}
.field label{display:block;font-size:.71rem;color:var(--gray);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:8px}
/* Buttons */
.btn{border:none;border-radius:10px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.86rem;cursor:pointer;transition:all .2s;width:100%;display:block;text-align:center;margin-top:7px}
.btn-teal{background:linear-gradient(135deg,var(--teal),#00a891);color:#000}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e6a800);color:#000}
.btn-red{background:linear-gradient(135deg,var(--red),#cc0000);color:#fff}
.btn-ghost{background:var(--surface);color:var(--gray);border:1px solid var(--border)}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;filter:none}
.btn-row{display:flex;gap:7px;margin-top:7px}
.btn-row .btn{flex:1;margin-top:0}
/* Info / alerts */
.info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:.81rem;color:var(--gray);line-height:1.6;margin-bottom:9px}
.info strong{color:var(--white)}
.info-locked{text-align:center;padding:22px;font-weight:600;color:var(--pink);font-size:.88rem}
.alert{padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:600;margin-bottom:10px;text-align:center}
.alert-gold{background:rgba(255,201,71,.15);border:1px solid rgba(255,201,71,.4);color:var(--gold)}
/* Toggles */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:.86rem;font-weight:500}
.toggle-desc{font-size:.71rem;color:var(--gray);margin-top:1px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:.3s}
.toggle-slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--gray);border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--teal)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px);background:#000}
/* Stats */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.stat-row:last-child{border-bottom:none}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--teal)}
/* Progress */
.progress-wrap{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--gray);margin-bottom:3px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));border-radius:2px;transition:width .4s ease}
/* Kat tabs */
.kat-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.kat-tab{padding:4px 7px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--gray);font-size:.7rem;font-weight:600;cursor:pointer;position:relative;font-family:'DM Sans',sans-serif;transition:all .2s}
.kat-tab.ernst.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,180,.1)}
.kat-tab.lustig.active{border-color:var(--pink);color:var(--pink);background:rgba(255,61,127,.1)}
.kat-tab.esc-kat.active{border-color:var(--gold);color:var(--gold);background:rgba(255,201,71,.1)}
.dot{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%}
.kat-header{padding:7px 11px;border-radius:10px;margin-bottom:8px}
.kat-header.ernst{background:rgba(0,212,180,.1);border-left:3px solid var(--teal)}
.kat-header.lustig{background:rgba(255,61,127,.1);border-left:3px solid var(--pink)}
.kat-header.esc-kat{background:rgba(255,201,71,.08);border-left:3px solid var(--gold)}
.kat-label{font-weight:600;font-size:.88rem}
.kat-desc{font-size:.7rem;color:var(--gray);margin-top:1px}
/* Song vote rows — two-line */
.song-vote-row{padding:7px 0;border-bottom:1px solid rgba(42,42,64,.5)}
.song-vote-row:last-child{border-bottom:none}
.song-vote-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.song-vote-bottom{display:flex;justify-content:flex-end;padding-left:26px}
.song-nr{width:19px;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--teal);text-align:center;flex-shrink:0}
.song-name{flex:1;font-size:.83rem;font-weight:500;line-height:1.3;word-break:break-word}
.song-name.own{color:var(--gray);font-style:italic}
.pts-chips{display:flex;gap:3px;flex-wrap:wrap}
.pt-chip{width:31px;height:27px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--gray);font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.pt-chip:hover:not(.taken){border-color:var(--teal);color:var(--teal)}
.pt-chip.selected{background:var(--teal);border-color:var(--teal);color:#000}
.pt-chip.taken{opacity:.2;cursor:not-allowed}
.own-tag{font-size:.66rem;color:var(--pink);background:rgba(255,61,127,.1);border:1px solid rgba(255,61,127,.25);border-radius:4px;padding:2px 6px;flex-shrink:0}
.pts-legend{display:flex;gap:3px;margin-bottom:7px;flex-wrap:wrap;justify-content:flex-end}
.pts-legend-chip{min-width:29px;height:19px;border-radius:4px;padding:0 3px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;font-family:'DM Sans',sans-serif}
/* Running order */
.ro-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.ro-row:last-child{border-bottom:none}
.ro-nr{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--teal);flex-shrink:0}
.ro-info{flex:1;min-width:0}
.ro-title{font-weight:600;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ro-url{font-size:.7rem;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Results */
.tabs{display:flex;gap:5px;margin-bottom:11px}
.tab{flex:1;padding:7px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--gray);font-size:.73rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,180,.08)}
.rank-row{display:flex;align-items:center;gap:9px;padding:7px 11px;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-medal{font-size:1rem;width:24px;text-align:center;flex-shrink:0}
.rank-song{flex:1;min-width:0}
.rank-song-name{font-weight:600;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--pink));margin-top:3px}
.rank-pts{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--gold);flex-shrink:0}
.kat-result{margin-bottom:9px}
.kat-result-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 11px;border-radius:8px 8px 0 0;gap:7px}
.kat-result-hdr.ernst{background:rgba(0,212,180,.15)}
.kat-result-hdr.lustig{background:rgba(255,61,127,.15)}
.kat-result-hdr.esc-kat{background:rgba(255,201,71,.12)}
.kat-result-name{font-weight:600;font-size:.85rem;flex-shrink:0}
.kat-result-winner{font-size:.71rem;color:var(--gold);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kat-result-rows{background:var(--surface);border-radius:0 0 8px 8px}
.kat-result-row{display:flex;align-items:center;gap:7px;padding:6px 11px;border-bottom:1px solid var(--border)}
.kat-result-row:last-child{border-bottom:none}
.kat-result-rank{width:17px;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--gray);text-align:center;flex-shrink:0}
.kat-result-song{flex:1;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kat-bar-wrap{width:50px;flex-shrink:0}
.kat-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--pink))}
.kat-result-pts{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--teal);flex-shrink:0}
/* Bingo */
.bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:12px}
.bingo-cell{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:5px 3px;text-align:center;font-size:.62rem;line-height:1.3;cursor:pointer;transition:all .2s;min-height:56px;display:flex;align-items:center;justify-content:center;font-weight:500;color:var(--gray)}
.bingo-cell.marked{background:var(--teal);border-color:var(--teal);color:#000;font-weight:700}
.bingo-cell.free{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.bingo-cell.bingo-line{background:var(--pink);border-color:var(--pink);color:#fff;font-weight:700}
.bingo-announce{background:linear-gradient(135deg,var(--pink),var(--gold));color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;text-align:center;padding:12px;border-radius:12px;margin-bottom:12px;animation:pulse-bg 1s ease-in-out infinite}
@keyframes pulse-bg{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}
/* Comments */
.comment-list{max-height:300px;overflow-y:auto;margin-bottom:10px}
.comment-item{padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.comment-item:last-child{border-bottom:none}
.comment-nick{font-size:.73rem;font-weight:700;color:var(--teal);flex-shrink:0}
.comment-text{font-size:.82rem;flex:1;word-break:break-word}
.comment-time{font-size:.65rem;color:var(--gray);flex-shrink:0;margin-top:2px}
.comment-input-row{display:flex;gap:7px}
.comment-input-row input{margin-bottom:0;flex:1}
.comment-input-row button{flex-shrink:0;margin-top:0;width:auto;padding:9px 14px}
/* Predictions */
.pred-row{padding:8px 0;border-bottom:1px solid var(--border)}
.pred-row:last-child{border-bottom:none}
.pred-label{font-size:.78rem;font-weight:600;margin-bottom:5px}
.pred-options{display:flex;gap:5px;flex-wrap:wrap}
.pred-opt{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--gray);font-size:.73rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.pred-opt.selected{border-color:var(--teal);color:var(--teal);background:rgba(0,212,180,.1)}
.pred-input{margin-bottom:0;margin-top:5px}
/* Drinking game */
.drink-section{margin-bottom:14px}
.drink-section-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--gold);letter-spacing:.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.drink-rule{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(42,42,64,.4);font-size:.81rem;line-height:1.5}
.drink-rule:last-child{border-bottom:none}
.drink-amount{flex-shrink:0;font-weight:700;color:var(--teal);font-size:.78rem;min-width:36px}
/* Info/Help content */
.help-section{margin-bottom:16px}
.help-section-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--teal);letter-spacing:.06em;margin-bottom:8px}
.help-step{display:flex;gap:10px;margin-bottom:8px;font-size:.82rem;line-height:1.55}
.help-step-nr{width:22px;height:22px;border-radius:50%;background:var(--teal);color:#000;font-weight:700;font-size:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.help-step-text strong{color:var(--white)}
.help-chip{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1px 7px;font-size:.72rem;font-weight:600;margin:1px}
/* Mode selector */
.mode-selector{display:flex;gap:7px;margin-bottom:10px}
.mode-opt{flex:1;padding:11px 8px;border-radius:12px;border:2px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;transition:all .2s}
.mode-opt.selected.party{border-color:var(--pink);background:rgba(255,61,127,.08)}
.mode-opt.selected.esc{border-color:var(--gold);background:rgba(255,201,71,.08)}
.mode-opt-icon{font-size:1.4rem;margin-bottom:3px}
.mode-opt-label{font-weight:700;font-size:.82rem}
.mode-opt-desc{font-size:.69rem;color:var(--gray);margin-top:1px}
.host-song-input{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.host-song-input .song-nr{flex-shrink:0}
.host-song-input input{margin-bottom:0;flex:1}
/* Playlist box */
.playlist-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:.7rem;color:var(--teal);word-break:break-all;font-family:monospace;margin-bottom:7px}
/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--teal);color:var(--white);padding:9px 18px;border-radius:10px;font-size:.81rem;font-weight:500;z-index:9999;animation:fadeup .3s ease;white-space:nowrap;max-width:90vw;text-align:center}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.spinner{text-align:center;padding:50px;color:var(--gray)}
</style>
</head>

async function loadAll(){

function hashPin(p){ let h=0; for(const c of String(p)) h=(h*31+c.charCodeAt(0))&0xffffffff; return h.toString(16); }

async function tryLogin(nick,pin,silent=false){
  nick=(nick||"").trim();
  if(!nick||!pin||String(pin).length!==4){ if(!silent) showToast("Nickname und 4-stellige PIN eingeben."); return false; }
  const {data:ex}=await sb.from("esc_users").select("*").eq("nickname_lower",nick.toLowerCase()).maybeSingle();
  if(ex){
    if(ex.pin_hash!==hashPin(pin)){ if(!silent) showToast("Falsche PIN für diesen Nickname."); return false; }
    currentUser=ex;
  } else {
    if(silent) return false;
    const {data:cr,error}=await sb.from("esc_users").insert({
      nickname:nick,nickname_lower:nick.toLowerCase(),pin_hash:hashPin(pin),
      song_title:null,youtube_url:null,ballot:null,has_voted:false,predictions:null
    }).select().single();
    if(error){ if(!silent) showToast("Nickname vergeben – anderen Namen oder PIN versuchen."); return false; }
    currentUser=cr; allUsers.push(cr);
  }
  localStorage.setItem("esc_user",JSON.stringify({n:nick,p:pin}));
  if(!silent) showToast("Willkommen, "+currentUser.nickname+"! 🎤");
  _ballot = currentUser.ballot ? JSON.parse(JSON.stringify(currentUser.ballot)) : {};
  _predictions = currentUser.predictions ? JSON.parse(JSON.stringify(currentUser.predictions)) : {};
  activeNav="info"; return true;
}

  appState = merged;
}

function calcPointScale(n){
  const full=[12,10,8,7,6,5,4,3,2,1];
  if(n>=10) return full;
  if(n<=0)  return [];
  const priority=[12,10,8,1,3,4,6,7,2,5];
  return priority.slice(0,n).sort((a,b)=>b-a);
}
function getPointScale(excludeOwn){
  const n=getSongCount()-(excludeOwn?1:0);
  return calcPointScale(n);
}

function extractYtId(url){ if(!url) return null; const m=url.match(/(?:youtu\.be\/|[?&]v=|\/embed\/)([A-Za-z0-9_-]{11})/); return m?m[1]:null; }
function showToast(msg){ document.querySelectorAll(".toast").forEach(e=>e.remove()); const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2800); }
function copyToClipboard(text){ navigator.clipboard.writeText(text).then(()=>showToast("Link kopiert!")); }
function setNav(id){ activeNav=id; render(); }
function setKat(i){ activeKat=i; render(); }
function setResultTab(t){ resultTab=t; render(); }
function fmtTime(iso){ const d=new Date(iso); return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); }
// Returns kategorien in the reveal order set by host (or default order)
function getRevealKats(){
  const order = appState.reveal_kat_order;
  if(!order || order.length === 0) return getKategorien();
  const kats = getKategorien();
  // Sort by order array, unknown IDs go last
  return [...kats].sort((a,b)=>{
    const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
    if(ia===-1 && ib===-1) return 0;
    if(ia===-1) return 1;
    if(ib===-1) return -1;
    return ia - ib;
  });
}

async function hostMoveKat(fromIdx, dir){
  const kats = getRevealKats();
  const order = kats.map(k=>k.id);
  const toIdx = fromIdx + dir;
  if(toIdx < 0 || toIdx >= order.length) return;
  [order[fromIdx], order[toIdx]] = [order[toIdx], order[fromIdx]];
  await saveState({reveal_kat_order: order});
  render();
}

function calcResults(){
  const songs=appState.running_order||[];
  const kats=getKategorien();
  const totals={},byKat={};
  kats.forEach(k=>{byKat[k.id]={};songs.forEach((_,i)=>byKat[k.id][i]=0);});
  songs.forEach((_,i)=>totals[i]=0);
  allUsers.filter(u=>u.ballot).forEach(u=>{
    Object.entries(u.ballot||{}).forEach(([katId,sm])=>{
      Object.entries(sm||{}).forEach(([sidx,pts])=>{
        if(byKat[katId]){
          byKat[katId][sidx]=(byKat[katId][sidx]||0)+Number(pts);
          // Sonderpreis excluded from totals
          const kat=kats.find(k=>k.id===katId);
          if(!kat?.sonder) totals[sidx]=(totals[sidx]||0)+Number(pts);
        }
      });
    });
  });
  return{byKat,totals,songs,kats};
}
function getPlaylistUrl(){
  const ids=(appState.running_order||[]).map(s=>extractYtId(s.youtube_url)).filter(Boolean);
  return ids.length?"https://www.youtube.com/watch_videos?video_ids="+ids.join(","):null;
}

  const dl=getVotingDeadline();
  return dl&&new Date()>dl;
}
function getVotingRemainingSeconds(){
  const dl=getVotingDeadline();
  if(!dl) return null;
  return Math.max(0,Math.round((dl-new Date())/1000));
}

function hostExportEvent(){
  const {byKat,totals} = calcResults ? calcResults() : {byKat:{},totals:{}};
  const songs = appState.running_order || [];
  const ranked = Object.entries(totals)
    .map(([idx,pts])=>({rank:0,song:songs[Number(idx)]?.title||"?",pts:Number(pts)}))
    .sort((a,b)=>b.pts-a.pts)
    .map((r,i)=>({...r,rank:i+1}));

  const snapshot = {
    exported_at: new Date().toISOString(),
    mode: appState.mode,
    songs: songs.map(s=>s.title),
    participants: allUsers.map(u=>u.nickname),
    voted: allUsers.filter(u=>u.has_voted).map(u=>u.nickname),
    results_gesamt: ranked,
    results_per_kategorie: {},
  };

  getKategorien().forEach(k=>{
    const scores = Object.entries(byKat[k.id]||{})
      .map(([idx,pts])=>({song:songs[Number(idx)]?.title||"?",pts:Number(pts)}))
      .sort((a,b)=>b.pts-a.pts);
    snapshot.results_per_kategorie[k.label] = scores;
  });

  const blob = new Blob([JSON.stringify(snapshot,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "esc-event-"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("📦 Export heruntergeladen!");
}

// ── AUTO-FILL ESC SONGS ───────────────────────────────────────────────────
async function hostAutoFillEscSongs(){
  const finalists = getEscFinalists();
  if(!finalists.length){
    showToast("Erst Finalisten im Panel markieren!");
    return;
  }
  // Sort by official running order
  const finalistIds = finalists.map(c=>c.id);
  const ordered = ESC2026_RUNNING_ORDER
    .filter(id => finalistIds.includes(id))
    .map(id => ESC2026_ALL.find(c=>c.id===id))
    .filter(Boolean);
  // Append any finalists not in running order at end
  finalists.forEach(c=>{ if(!ordered.find(o=>o.id===c.id)) ordered.push(c); });

  const songs = ordered.map(c => ({
    title: c.flag + " " + c.name + " – " + c.artist + " – " + c.song,
    youtube_url: ESC2026_YOUTUBE[c.id] ? "https://youtube.com/watch?v=" + ESC2026_YOUTUBE[c.id] : ""
  }));

  // Save directly — no need to go through input fields
  await saveState({running_order: songs});
  appState = {...appState, running_order: songs};
  showToast("✅ " + songs.length + " Songs gespeichert!");
  // Switch to Order tab so user can see the result immediately
  activeNav = "order";
  render();
}

  if(field==="jury") country.total = (Number(value)||0) + (country.tele||0);

function renderEscLiveGuest(){
  const finalists = getEscFinalists();

  const hasResults = Object.keys(results).length > 0;

    return `<div class="card"><div class="info" style="text-align:center;padding:20px">⏳ Der Host trägt gerade die ESC-Punkte ein — die Rangliste erscheint automatisch sobald Punkte da sind.</div></div>`;

  // Build ranked arrays for ESC total, jury, tele
  const escAll = finalists.map(c => {
    const r = results[c.id]||{};
    return {id:c.id, c, jury:r.jury||0, tele:r.tele||0, total:(r.jury||0)+(r.tele||0)};
  }).filter(r => r.total > 0 || r.jury > 0 || r.tele > 0);

  const byTotal = [...escAll].sort((a,b)=>b.total-a.total);
  const byJury  = [...escAll].sort((a,b)=>b.jury-a.jury);
  const byTele  = [...escAll].sort((a,b)=>b.tele-a.tele);

  // Party votes: map song title → country id by matching running order
  const {totals, songs} = calcResults ? calcResults() : {totals:{},songs:[]};
  // Build partyPts by country id via running_order match
  const partyPts = {};
  finalists.forEach(c => {
    const songIdx = songs.findIndex(s => s.title && s.title.includes(c.name));
    if(songIdx >= 0 && totals[songIdx] !== undefined) {
      partyPts[c.id] = Number(totals[songIdx]);
    }
  });
  const byParty = finalists
    .filter(c => partyPts[c.id] !== undefined)
    .sort((a,b) => (partyPts[b.id]||0) - (partyPts[a.id]||0));

  // Rank lookup helpers
  const rankOf = (arr, id) => arr.findIndex(r=>(r.id||r.id)===id) + 1 || "—";

  // Full comparison table — all 25 sorted by ESC total
  const tableRows = byTotal.map((r, i) => {
    const rankTotal = i+1;
    const rankJury  = byJury.findIndex(x=>x.id===r.id)+1;
    const rankTele  = byTele.findIndex(x=>x.id===r.id)+1;
    const partyRank = byParty.findIndex(c=>c.id===r.id)+1;
    const partyPt   = partyPts[r.id]||0;
    const medal     = ["🥇","🥈","🥉"][i]||"";
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:5px 4px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--teal)">${medal||rankTotal}</td>
      <td style="padding:5px 4px;font-size:.95rem">${r.c.flag}</td>
      <td style="padding:5px 4px;font-size:.75rem;font-weight:600;max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.c.name}</td>
      <td style="padding:5px 4px;text-align:right;font-size:.75rem;color:var(--gray)">${r.jury||"—"}</td>
      <td style="padding:5px 4px;text-align:right;font-size:.75rem;color:var(--gray)">${r.tele||"—"}</td>
      <td style="padding:5px 4px;text-align:right;font-size:.8rem;font-weight:700;color:var(--teal)">${r.total}</td>
      <td style="padding:5px 4px;text-align:right;font-size:.75rem;color:${partyPt>0?"var(--gold)":"var(--border)"}">${partyPt||"—"}</td>
      <td style="padding:5px 4px;text-align:center;font-size:.7rem;color:var(--gray)">${rankJury||"—"}</td>
      <td style="padding:5px 4px;text-align:center;font-size:.7rem;color:var(--gray)">${rankTele||"—"}</td>
      <td style="padding:5px 4px;text-align:center;font-size:.7rem;color:var(--teal)">${rankTotal}</td>
      <td style="padding:5px 4px;text-align:center;font-size:.7rem;color:${partyRank>0?"var(--gold)":"var(--border)"}">${partyRank||"—"}</td>
    </tr>`;
  }).join("");

  return `<div class="card" style="padding:12px 8px">
    <div class="card-title" style="margin-bottom:10px">📊 ESC-Ergebnis vs. Party-Voting</div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="width:100%;border-collapse:collapse;font-size:.78rem">
        <thead>
          <tr style="border-bottom:2px solid var(--border)">
            <th style="padding:4px;text-align:center;font-size:.65rem;color:var(--gray);font-weight:600">#</th>
            <th style="padding:4px"></th>
            <th style="padding:4px;text-align:left;font-size:.65rem;color:var(--gray);font-weight:600">Land</th>
            <th style="padding:4px;text-align:right;font-size:.65rem;color:var(--gray);font-weight:600">Jury</th>
            <th style="padding:4px;text-align:right;font-size:.65rem;color:var(--gray);font-weight:600">TV</th>
            <th style="padding:4px;text-align:right;font-size:.65rem;color:var(--teal);font-weight:600">∑</th>
            <th style="padding:4px;text-align:right;font-size:.65rem;color:var(--gold);font-weight:600">Party</th>
            <th style="padding:4px;text-align:center;font-size:.65rem;color:var(--gray);font-weight:600">RJ</th>
            <th style="padding:4px;text-align:center;font-size:.65rem;color:var(--gray);font-weight:600">RTV</th>
            <th style="padding:4px;text-align:center;font-size:.65rem;color:var(--teal);font-weight:600">R∑</th>
            <th style="padding:4px;text-align:center;font-size:.65rem;color:var(--gold);font-weight:600">RP</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>

  </div>`;
}

// ── VOTING ────────────────────────────────────────────────────────────────
function renderVoting(){
  const vis=appState.visibility;
  const ro=appState.running_order||[];
  const mode=getMode();
  if(!vis.voting) return `<div class="card"><div class="info-locked">🔒 Abstimmung ist noch nicht geöffnet.</div></div>`;
  const _votingLocked=votingIsLocked();
  const _votingRem=getVotingRemainingSeconds();
  if(!ro.length)  return `<div class="card"><div class="info">Keine Songs in der Running Order.</div></div>`;
  if(!_ballot) _ballot=currentUser?.ballot?JSON.parse(JSON.stringify(currentUser.ballot)):{};
  if(_votingLocked&&currentUser?.has_voted){
    return `<div class="card" style="text-align:center;padding:24px 14px">
      <div style="font-size:2.2rem;margin-bottom:8px">🔒</div>
      <div style="font-weight:700;font-size:.95rem;margin-bottom:5px">Voting beendet</div>
      <div style="color:var(--gray);font-size:.8rem">Die Verkündung beginnt in Kürze. Deine Stimme wurde gezählt.</div>
      <div style="color:var(--gray);font-size:.7rem;margin-top:5px">${allUsers.filter(u=>u.has_voted).length} von ${allUsers.length} haben abgestimmt</div>
    </div>`;
  }
  if(_votingLocked) return `<div class="card"><div class="info-locked">🔒 Das Voting ist beendet. Die Ergebnisverkündung beginnt in Kürze.</div></div>`;
  if(currentUser?.has_voted&&!_editingVote){
    return `<div class="card" style="text-align:center;padding:24px 14px">
      <div style="font-size:2.2rem;margin-bottom:8px">✅</div>
      <div style="font-weight:600;font-size:.95rem;margin-bottom:5px">Stimme abgegeben!</div>
      <div style="color:var(--gray);font-size:.8rem">Warte auf die Ergebnisse vom Host.</div>
      <div style="color:var(--gray);font-size:.7rem;margin-top:5px">${allUsers.filter(u=>u.has_voted).length} von ${allUsers.length} haben abgestimmt</div>
      <button class="btn btn-ghost" style="margin-top:12px" onclick="_editingVote=true;render()">Stimme ändern</button>
    </div>`;
  }
  const kats=getKategorien();
  if(activeKat>=kats.length) activeKat=0;
  const ownIdx=mode==="party"?ro.findIndex(s=>currentUser?.song_title&&s.title===currentUser.song_title&&s.youtube_url===currentUser.youtube_url):-1;
  const hasOwn=ownIdx>=0;
  const pts=getPointScale(hasOwn);
  const kat=kats[activeKat];
  const katBallot=_ballot[kat.id]||{};
  const used=new Set(Object.values(katBallot));
  const needed=pts.length;
  const filledKats=kats.filter(k=>{
    const assigned=Object.keys(_ballot[k.id]||{}).filter(idx=>String(idx)!==String(ownIdx));
    return assigned.length>=needed;
  }).length;
  const katTabs=kats.map((k,i)=>{
    const assigned=Object.keys(_ballot[k.id]||{}).filter(idx=>String(idx)!==String(ownIdx)).length;
    const dotColor=assigned>=needed?"var(--teal)":assigned>0?"var(--gold)":"";
    return `<button class="kat-tab ${k.gruppe} ${i===activeKat?"active":""}" onclick="setKat(${i})">${k.id}${dotColor?`<span class="dot" style="background:${dotColor}"></span>`:""}</button>`;
  }).join("");
  const legend=pts.map(p=>{const u=used.has(p);return `<div class="pts-legend-chip" style="color:${u?(p===12?"var(--gold)":"var(--teal)"):"var(--gray)"};text-decoration:${u?"line-through":"none"}">${p}</div>`;}).join("");
  const songRows=ro.map((s,i)=>{
    const isOwn=i===ownIdx;
    const assigned=katBallot[i];
    if(isOwn) return `<div class="song-vote-row"><div class="song-vote-top"><div class="song-nr">${i+1}</div><div class="song-name own">${s.title}</div><span class="own-tag">dein Song</span></div></div>`;
    const chips=pts.map(p=>{
      const sel=assigned===p,taken=!sel&&used.has(p);
      return `<button class="pt-chip ${sel?"selected":""} ${taken?"taken":""}" onclick="${taken?"":"toggleChip('"+kat.id+"',"+i+","+p+")"}">${p}</button>`;
    }).join("");
    return `<div class="song-vote-row"><div class="song-vote-top"><div class="song-nr">${i+1}</div><div class="song-name">${s.title}</div></div><div class="song-vote-bottom"><div class="pts-chips">${chips}</div></div></div>`;
  }).join("");
  const canSubmit=kats.every(k=>Object.keys(_ballot[k.id]||{}).filter(idx=>String(idx)!==String(ownIdx)).length>=needed);
  return `
  <div class="progress-wrap">
    <div class="progress-label"><span>Kategorien ausgefüllt</span><span>${filledKats} / ${kats.length}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(filledKats/kats.length)*100}%"></div></div>
  </div>
  ${kats.length>1?`<div class="kat-tabs">${katTabs}</div>`:""}
  <div class="card">
    <div class="kat-header ${kat.gruppe}"><div class="kat-label">${kat.emoji} ${kat.label}</div><div class="kat-desc">${kat.desc}</div></div>
    <div class="pts-legend">${legend}</div>
    ${songRows}
  </div>
  <button class="btn btn-teal" ${canSubmit?"":"disabled"} onclick="${canSubmit?"doSubmitVote()":""}">

// ── RESULTS ───────────────────────────────────────────────────────────────
function renderResults(){
  const vis=appState.visibility;
  if(!isHost&&!vis.results) return `<div class="card"><div class="info-locked">🔒 Ergebnisse noch nicht freigegeben.</div></div>`;
  const {byKat,totals,songs,kats}=calcResults();
  if(!songs.length) return `<div class="card"><div class="info">Keine Songs vorhanden.</div></div>`;
  const ranked=Object.entries(totals).map(([idx,pts])=>({idx:Number(idx),pts,name:songs[idx]?.title||"?"})).sort((a,b)=>b.pts-a.pts);
  const maxPts=ranked[0]?.pts||1;
  const mode=getMode();
  const showKatTabs=mode==="party"&&kats.length>1;
  let tabs="";
  if(showKatTabs) tabs=`<div class="tabs"><div class="tab ${resultTab==="gesamt"?"active":""}" onclick="setResultTab('gesamt')">🏆 Gesamt</div><div class="tab ${resultTab==="main"?"active":""}" onclick="setResultTab('main')">⭐ Kategorien</div><div class="tab ${resultTab==="sonder"?"active":""}" onclick="setResultTab('sonder')">🤪 Sonderpreis</div></div>`;
  let content="";
  if(!showKatTabs||resultTab==="gesamt"){
    const rows=ranked.map((r,i)=>`<div class="rank-row"><div class="rank-medal">${MEDALS[i]||i+1+"."}</div><div class="rank-song"><div class="rank-song-name">${r.name}</div><div class="rank-bar" style="width:${(r.pts/maxPts)*100}%"></div></div><div class="rank-pts">${r.pts}</div></div>`).join("");
    const v=allUsers.filter(u=>u.has_voted).length;
    content=`<div class="card">${rows}<div style="font-size:.7rem;color:var(--gray);text-align:center;margin-top:9px">${v} Stimmzettel</div></div>`;
  } else {
    // Group totals for ernst/lustig
    const groupTotals={};
    songs.forEach((_,i)=>groupTotals[i]=0);
    kats.filter(k=>k.gruppe===resultTab||k.id===resultTab).forEach(k=>{
      Object.entries(byKat[k.id]||{}).forEach(([idx,pts])=>{ groupTotals[idx]=(groupTotals[idx]||0)+Number(pts); });
    });
    const groupRanked=Object.entries(groupTotals).map(([idx,pts])=>({idx:Number(idx),pts,name:songs[idx]?.title||"?"})).sort((a,b)=>b.pts-a.pts);
    const groupMax=groupRanked[0]?.pts||1;
    const groupLabel=resultTab==="main"?"⭐ Gesamt Hauptkategorien":"🤪 Sonderpreis-Gesamt";
    const groupColor=resultTab==="main"?"var(--teal)":"var(--pink)";
    const groupSummary=`<div class="kat-result" style="margin-top:4px">
      <div class="kat-result-hdr ${resultTab}" style="border-top:2px solid ${groupColor}">
        <span class="kat-result-name" style="color:${groupColor}">${groupLabel}</span>
        ${groupRanked[0]?`<span class="kat-result-winner">🏆 ${groupRanked[0].name}</span>`:""}
      </div>
      <div class="kat-result-rows">${groupRanked.map((r,i)=>`<div class="kat-result-row">
        <div class="kat-result-rank">${MEDALS[i]||i+1+"."}</div>
        <div class="kat-result-song">${r.name}</div>
        <div class="kat-bar-wrap"><div class="kat-bar" style="width:${(r.pts/groupMax)*100}%;background:${groupColor}"></div></div>
        <div class="kat-result-pts" style="color:${groupColor}">${r.pts}</div>
      </div>`).join("")}</div>
    </div>`;
    content=kats.filter(k=>k.gruppe===resultTab).map(kat=>{
      const scores=Object.entries(byKat[kat.id]||{}).map(([idx,pts])=>({idx:Number(idx),pts,name:songs[idx]?.title||"?"})).sort((a,b)=>b.pts-a.pts);
      const top=scores[0]?.pts||1;
      return `<div class="kat-result"><div class="kat-result-hdr ${kat.gruppe}"><span class="kat-result-name">${kat.emoji} ${kat.label}</span>${scores[0]?`<span class="kat-result-winner">🏆 ${scores[0].name}</span>`:""}</div><div class="kat-result-rows">${scores.map((s,i)=>`<div class="kat-result-row"><div class="kat-result-rank">${MEDALS[i]||i+1+"."}</div><div class="kat-result-song">${s.name}</div><div class="kat-bar-wrap"><div class="kat-bar" style="width:${(s.pts/top)*100}%"></div></div><div class="kat-result-pts">${s.pts}</div></div>`).join("")}</div></div>`;
    }).join("")+groupSummary;
  }
  return tabs+content;
}

function renderBingo(){
  const latestBingos=allBingos.slice(-3);
  const bingoAnnounce=latestBingos.length?`<div class="bingo-announce">🎯 BINGO! ${latestBingos.map(b=>b.nickname).join(", ")} ${latestBingos.length===1?"hat":"haben"} Bingo!</div>`:"";

  if(!_bingoCard){ generateBingoCard(); }
  const winCells=getBingoLines();
  const hasBingo=winCells.size>0;
  const cells=_bingoCard.map((t,i)=>{
    const isFree=i===12;
    const isMarked=_bingoMarked.has(i);
    const isWin=winCells.has(i);
    const cls=isFree?"free":isWin?"bingo-line":isMarked?"marked":"";
    return `<div class="bingo-cell ${cls}" onclick="toggleBingoCell(${i})">${t}</div>`;
  }).join("");
  return `${bingoAnnounce}
  ${hasBingo?`<div class="alert alert-gold">🎯 BINGO! Du hast eine vollständige Reihe!</div>`:""}
  <div class="bingo-grid">${cells}</div>
`;
}

function renderPredictionsAdmin(){
  const withPreds=allUsers.filter(u=>u.predictions&&Object.keys(u.predictions).length>0);
  if(!withPreds.length) return `<div class="card"><div class="info">Noch keine Tipps eingegangen.</div></div>`;

  const mode=getMode();
  if(mode!=="esc") {
    // Party mode: show raw predictions
    return withPreds.map(u=>`<div class="card">
      <div class="card-title" style="color:var(--gold)">${u.nickname}</div>
      ${PREDICTIONS.map(p=>`<div class="stat-row"><span style="font-size:.78rem;color:var(--gray)">${p.label}</span><span style="font-size:.82rem;font-weight:600">${u.predictions[p.id]||"—"}</span></div>`).join("")}
    </div>`).join("");
  }

  // ESC mode: evaluate predictions against actual results
  const results = appState.esc_results || {};
  const finalists = getEscFinalists();
  const hasResults = Object.keys(results).length > 0;

  // Build actual top-5 for jury, tele, total
  const escSorted = (field) => finalists
    .map(c=>({id:c.id,pts:(results[c.id]||{})[field]||0}))
    .filter(r=>r.pts>0)
    .sort((a,b)=>b.pts-a.pts)
    .slice(0,5)
    .map(r=>r.id);

  const actualJury   = escSorted("jury");
  const actualTele   = escSorted("tele");
  const actualTotal  = escSorted("total")||escSorted("jury").map((id,i)=>{
    // fallback: compute total
    return finalists.map(c=>({id:c.id,total:(results[c.id]?.jury||0)+(results[c.id]?.tele||0)}))
      .sort((a,b)=>b.total-a.total).slice(0,5).map(r=>r.id);
  })[0];
  const winner = actualTotal[0]||null;

  // Score each user
  const scored = withPreds.map(u=>{
    const p = u.predictions||{};
    let score = 0;
    const details = [];

    // Winner
    const theirWinner = finalists.find(c=>c.name.toLowerCase().includes((p.winner||"").toLowerCase()))?.id
      || (p.winner||"").toUpperCase();
    const winnerHit = winner && (theirWinner===winner || p.winner===winner);
    if(winnerHit){ score+=5; details.push("🏆 Sieger richtig: +5"); }

    // Top-5 hits
    const checkTop5 = (cat, actual, label) => {
      let hits=0;
      [1,2,3,4,5].forEach(i=>{
        const v=p[cat+"_"+i];
        if(v && actual.includes(v)){ hits++; score+=2; }
      });
      if(hits>0) details.push(`${label}: ${hits}/5 Treffer (+${hits*2})`);
    };
    if(hasResults){
      checkTop5("top5_jury", actualJury, "⚖️ Jury");
      checkTop5("top5_tv",   actualTele, "📺 TV");
      checkTop5("top5_gesamt", actualTotal.length?actualTotal:actualJury, "🏆 Gesamt");
    }

    // Exact position bonus
    if(hasResults && actualTotal.length){
      [1,2,3,4,5].forEach(i=>{
        if(p["top5_gesamt_"+i] === actualTotal[i-1]){ score+=3; details.push(`🎯 Pos ${i} exakt: +3`); }
      });
    }

    return {u, score, details, winnerHit};
  }).sort((a,b)=>b.score-a.score);

  // Leaderboard
  const leaderboard = scored.map((s,i)=>`<div class="stat-row" style="${i===0?"background:rgba(255,201,71,.08);border-radius:8px;padding:4px 8px":""}">
    <span style="font-weight:600">${["🥇","🥈","🥉"][i]||i+1+"."} ${s.u.nickname}${s.winnerHit?" 🎯":""}</span>
    <span class="stat-val" style="color:var(--gold)">${s.score} Pkt</span>
  </div>`).join("");

  // Detail cards
  const details = scored.map(s=>`<div class="card">
    <div class="card-title" style="color:var(--gold);display:flex;justify-content:space-between">
      <span>${s.u.nickname}</span><span>${s.score} Pkt</span>
    </div>
    ${s.details.length?s.details.map(d=>`<div style="font-size:.75rem;color:var(--teal);margin-bottom:3px">✓ ${d}</div>`).join("")
      :`<div style="font-size:.75rem;color:var(--gray)">Keine Treffer</div>`}
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      ${PREDICTIONS.map(p_=>`<div class="stat-row"><span style="font-size:.73rem;color:var(--gray)">${p_.label}</span><span style="font-size:.78rem">${s.u.predictions[p_.id]||"—"}</span></div>`).join("")}
      ${["jury","tv","gesamt"].map(cat=>{
        const vals=[1,2,3,4,5].map(i=>{
          const id=s.u.predictions["top5_"+cat+"_"+i];
          const c=finalists.find(f=>f.id===id);
          return c?c.flag+" "+c.name:"—";
        });
        const labels={"jury":"⚖️ Jury","tv":"📺 TV","gesamt":"🏆 Gesamt"};
        return `<div style="margin-top:5px"><div style="font-size:.7rem;color:var(--gray);font-weight:600;margin-bottom:3px">${labels[cat]} Top 5</div>
        <div style="font-size:.75rem">${vals.join(" · ")}</div></div>`;
      }).join("")}
    </div>
  </div>`).join("");

  return `<div class="card">
    <div class="card-title">🎯 Tipp-Auswertung</div>
    ${!hasResults?`<div class="alert alert-gold">⚠️ Noch keine ESC-Ergebnisse eingetragen — Punkte werden berechnet sobald der Host Daten eingibt.</div>`:""}
    <div style="font-size:.72rem;color:var(--gray);margin-bottom:10px">Wertung: Sieger richtig +5 · Top-5 Treffer +2 · Exakte Position +3</div>
    ${leaderboard}
  </div>
  ${details}`;
}

async function hostResetPin(userId, nickname){

// REVEAL SYSTEM v2 — ESC-Stil + Finale Reveals
// No DB schema changes — reveal_state JSONB handles all new fields

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

function calcCatTotals(katId){
  const songs=appState.running_order||[];
  const t={};
  songs.forEach((_,i)=>t[i]=0);
  allUsers.filter(u=>u.ballot).forEach(u=>{
    Object.entries(u.ballot[katId]||{}).forEach(([si,pts])=>{ t[si]=(t[si]||0)+Number(pts); });
  });
  return t;
}
function calcGroupTotals(gruppe){
  const songs=appState.running_order||[];
  const t={};
  songs.forEach((_,i)=>t[i]=0);
  KATEGORIEN.filter(k=>k.gruppe===gruppe).forEach(k=>{
    Object.entries(calcCatTotals(k.id)).forEach(([si,pts])=>{ t[si]=(t[si]||0)+pts; });
  });
  return t;
}
function topSongIdx(totals){ return Object.entries(totals).sort((a,b)=>b[1]-a[1])[0]; }

async function hostStartReveal(){
  if(!confirm("Ergebnisverkündung starten? Gäste sehen erst was du aufdeckst.")) return;
  const escMode = appState.reveal_esc_mode||false;
  const kats=getRevealKats();
  const voterOrder=shuffle(allUsers.map(u=>u.id));
  await saveState({reveal_state:{
    active:true, phase:"kat",
    katIdx:0, songIdx:-1,
    escMode,
    voterOrder, voterIdx:-1, step:-1,
    finaleStep:0,
  }});
  activeNav="reveal"; render();
}

async function hostRevealNext(){
  const rs=appState.reveal_state||{};
  const kats=getRevealKats();
  const songs=appState.running_order||[];

  if(rs.phase==="finale"){
    if(rs.finaleStep<5) await saveState({reveal_state:{...rs,finaleStep:rs.finaleStep+1}});
    else await saveState({reveal_state:{...rs,phase:"done"}});
    render(); return;
  }
  if(rs.phase==="done") return;

  if(rs.escMode){
    if(rs.voterIdx===-1){
      // kat header → first voter
      await saveState({reveal_state:{...rs,voterIdx:0,step:0}});
    } else if(rs.step===0){
      await saveState({reveal_state:{...rs,step:1}});
    } else if(rs.step===1){
      await saveState({reveal_state:{...rs,step:2}});
    } else if(rs.step===2){
      await saveState({reveal_state:{...rs,step:3}});
    } else {
      // next voter or next kat
      const nextVI=rs.voterIdx+1;
      if(nextVI<(rs.voterOrder||[]).length){
        await saveState({reveal_state:{...rs,voterIdx:nextVI,step:0}});
      } else {
        await advanceRevealKat(rs,kats,songs);
      }
    }
  } else {
    // aggregate
    const catTotals=calcCatTotals(kats[rs.katIdx]?.id);
    const sorted=Object.entries(catTotals).sort((a,b)=>a[1]-b[1]);
    if(rs.songIdx<sorted.length-1){
      await saveState({reveal_state:{...rs,songIdx:rs.songIdx+1}});
    } else {
      await advanceRevealKat(rs,kats,songs);
    }
  }
  render();
}

async function advanceRevealKat(rs,kats,songs){
  if(rs.katIdx<kats.length-1){
    const newVO=shuffle(allUsers.map(u=>u.id));
    await saveState({reveal_state:{...rs,katIdx:rs.katIdx+1,songIdx:-1,voterOrder:newVO,voterIdx:-1,step:-1}});
  } else {
    await saveState({reveal_state:{...rs,phase:"finale",finaleStep:0}});
  }
}

async function hostEndReveal(){
  await saveState({reveal_state:{active:false,katIdx:0,songIdx:-1,phase:"kat",finaleStep:0}});
  activeNav="results"; render();
}

// ── Reveal control panel (host) ───────────────────────────────────────────
function buildRevealHostPanel(){
  const rs=appState.reveal_state||{active:false};
  const kats=getRevealKats();
  const songs=appState.running_order||[];
  const isDone=rs.phase==="done";
  const isFinale=rs.phase==="finale";

  let statusText="Nicht aktiv";
  let nextLabel="▶ NÄCHSTER SCHRITT";

  if(rs.active&&!isDone){
    if(isFinale){
      const fl=rs.finaleStep||0;
      const flLabels=["Lustig-Sieger bereit","Lustig-Sieger sichtbar","Ernst-Sieger bereit","Ernst-Sieger sichtbar","Gesamtsieger bereit","Gesamtsieger sichtbar"];
      statusText="🏆 Finale — "+flLabels[fl];
      const nxt=["▶ LUSTIG-SIEGER ANZEIGEN","▶ AUFDECKEN ✨","▶ ERNST-SIEGER ANZEIGEN","▶ AUFDECKEN ✨","▶ GESAMTSIEGER ANZEIGEN","▶ AUFDECKEN 🏆"];
      nextLabel=nxt[fl]||"▶ FERTIG";
    } else if(rs.escMode){
      const kat=kats[rs.katIdx];
      const voter=allUsers.find(u=>u.id===(rs.voterOrder||[])[rs.voterIdx]);
      if(rs.voterIdx===-1){
        statusText=`${kat?.emoji} ${kat?.label} — Kategorie-Header`;
        nextLabel="▶ ERSTEN ABSTIMMENDEN EINBLENDEN";
      } else {
        const stepLabels=["Teilnehmer eingeblendet","Punkte 1–N sichtbar","Top-Punkt aufgedeckt","Zwischenstand"];
        statusText=`${kat?.emoji} ${kat?.label} · ${voter?.nickname||"?"} (${rs.voterIdx+1}/${(rs.voterOrder||[]).length}) · ${stepLabels[rs.step]||""}`;
        const nxtLabels=["▶ PUNKTE EINBLENDEN","▶ TOP-PUNKT AUFDECKEN 🥁","▶ ZWISCHENSTAND ZEIGEN","▶ NÄCHSTER ABSTIMMENDER"];
        const isLastVoter=rs.voterIdx===(rs.voterOrder||[]).length-1;
        nextLabel=(rs.step===3&&isLastVoter)?"▶ NÄCHSTE KATEGORIE":(nxtLabels[rs.step]||"▶ WEITER");
      }
    } else {
      const kat=kats[rs.katIdx];
      const catTotals=calcCatTotals(kat?.id||"E1");
      const sorted=Object.entries(catTotals).sort((a,b)=>a[1]-b[1]);
      const rem=sorted.length-(rs.songIdx+1);
      statusText=`${kat?.emoji} ${kat?.label} · ${rs.songIdx+1}/${sorted.length} Songs`;
      nextLabel=rs.songIdx<sorted.length-1?`▶ NÄCHSTEN SONG AUFDECKEN (${rem} übrig)`:"▶ NÄCHSTE KATEGORIE";
    }
  } else if(isDone){
    statusText="✅ Alle Ergebnisse verkündet!";
  }

  return `<div class="card" style="margin-bottom:10px;border-color:rgba(255,201,71,.4)">
    <div class="card-title" style="color:var(--gold)">🎭 Steuerung</div>
    <div style="font-size:.78rem;color:var(--gray);margin-bottom:10px;line-height:1.5">${statusText}</div>
    ${!isDone
      ?`<button class="btn btn-gold" onclick="hostRevealNext()" style="font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.08em">${nextLabel}</button>`
      :`<div class="alert alert-gold">✅ Alle Ergebnisse verkündet!</div>`
    }
    <button class="btn btn-ghost" style="margin-top:6px" onclick="hostEndReveal()">Verkündung beenden</button>
    <div style="font-size:.7rem;color:var(--gray);margin-top:8px;text-align:center">👁 Screenshare diesen Tab auf den TV — Gäste sehen die Ansicht unten live</div>
  </div>`;
}

function buildRevealScreen(){
  const rs=appState.reveal_state||{active:false};
  if(!rs.active) return `<div class="card"><div style="text-align:center;padding:24px;color:var(--gray)">⏳ Bereit für die Verkündung…</div></div>`;
  if(rs.phase==="done") return `<div class="card" style="padding:20px;text-align:center"><div style="font-size:2rem">🎉</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);margin-top:8px">SHOW'S OVER!</div></div>`;
  if(rs.phase==="finale") return buildFinaleScreen(rs);
  return rs.escMode ? buildEscScreen(rs) : buildAggregateScreen(rs);
}

}

// ── ESC-Stil screen ───────────────────────────────────────────────────────
function buildEscScreen(rs){
  const kats=getRevealKats();
  const songs=appState.running_order||[];
  const kat=kats[rs.katIdx]; if(!kat) return "";
  const katHdr=buildKatHeader(kat,rs.katIdx,kats.length,"ESC-STIL");

  if(rs.voterIdx===-1) return `<div class="card" style="padding:16px">${katHdr}
    <div style="text-align:center;padding:20px 0;color:var(--gray);font-style:italic;font-size:.85rem">Gleich geht's los…</div>
  </div>`;

  const voter=allUsers.find(u=>u.id===(rs.voterOrder||[])[rs.voterIdx]);
  if(!voter) return `<div class="card"><div style="color:var(--gray);padding:16px">?</div></div>`;

  const voterPts=Object.entries(voter.ballot?.[kat.id]||{})
    .map(([si,pts])=>({si:Number(si),pts:Number(pts),song:songs[Number(si)]?.title||"?"}))
    .sort((a,b)=>a.pts-b.pts);
  const topPt=voterPts[voterPts.length-1];
  const lowPts=voterPts.slice(0,-1);
  const maxPts=topPt?.pts||1;

  const voterHdr=`<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface);border-radius:10px;margin-bottom:12px">
    <div style="font-size:1.6rem">🎤</div>
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.05em">${voter.nickname}</div>
      <div style="font-size:.72rem;color:var(--gray);margin-top:1px">Abstimmender ${rs.voterIdx+1} von ${(rs.voterOrder||[]).length}</div>
    </div>
  </div>`;

  if(rs.step===0) return `<div class="card" style="padding:16px">${katHdr}${voterHdr}
    <div style="text-align:center;padding:14px 0;color:var(--gray);font-style:italic;font-size:.85rem">Die Punkte von ${voter.nickname}…</div>
  </div>`;

  const lowRows=lowPts.map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:.95rem;width:28px;text-align:center;color:var(--gray)">${p.pts}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:.82rem;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.song}</div>
      <div style="height:3px;border-radius:2px;margin-top:3px;background:var(--border);width:${(p.pts/maxPts)*100}%"></div>
    </div>
  </div>`).join("");

  const topHidden=`<div style="text-align:center;padding:14px;background:rgba(255,201,71,.06);border:1px dashed rgba(255,201,71,.3);border-radius:10px;margin-top:8px;color:var(--gray);font-style:italic;font-size:.85rem">
    und die <strong style="color:var(--gold)">${topPt?.pts} Punkte</strong> gehen an… 🥁
  </div>`;

  const topRevealed=`<div style="display:flex;align-items:center;gap:12px;padding:12px 10px;background:rgba(255,201,71,.06);border:1px solid rgba(255,201,71,.3);border-radius:12px;margin-top:8px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);width:42px;text-align:center;line-height:1">${topPt?.pts}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:.92rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${topPt?.song}</div>
      <div style="height:3px;border-radius:2px;margin-top:4px;background:linear-gradient(90deg,var(--gold),var(--pink));width:100%"></div>
    </div>
    <div style="font-size:1.3rem">✨</div>
  </div>`;

  if(rs.step===1) return `<div class="card" style="padding:16px">${katHdr}${voterHdr}${lowRows}${topHidden}</div>`;
  if(rs.step===2) return `<div class="card" style="padding:16px">${katHdr}${voterHdr}${lowRows}${topRevealed}</div>`;

  // step 3: zwischenstand
  const runTotals={};
  songs.forEach((_,i)=>runTotals[i]=0);
  for(let vi=0;vi<=rs.voterIdx;vi++){
    const u=allUsers.find(u=>u.id===(rs.voterOrder||[])[vi]);
    if(u) Object.entries(u.ballot?.[kat.id]||{}).forEach(([si,pts])=>{ runTotals[si]=(runTotals[si]||0)+Number(pts); });
  }
  const ranked=Object.entries(runTotals).map(([si,pts])=>({si:Number(si),pts,song:songs[si]?.title||"?"})).sort((a,b)=>b.pts-a.pts);
  const maxR=ranked[0]?.pts||1;
  const MEDALS_Z=["🥇","🥈","🥉","4.","5.","6.","7.","8."];
  const remaining=(rs.voterOrder||[]).length-rs.voterIdx-1;
  return `<div class="card" style="padding:16px">${katHdr}
    <div style="font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:.12em;color:var(--gray);margin-bottom:10px">
      ZWISCHENSTAND NACH ${rs.voterIdx+1} / ${(rs.voterOrder||[]).length} ABSTIMMENDEN
      ${remaining>0?`<span style="color:var(--gray);font-size:.7rem;font-family:'DM Sans',sans-serif;font-weight:400"> · noch ${remaining}</span>`:""}
    </div>
    ${ranked.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--border)">
      <div style="width:22px;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gray);text-align:center">${MEDALS_Z[i]||i+1+"."}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:.84rem;font-weight:${i===0?600:400};color:${i===0?"var(--white)":"var(--gray)"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.song}</div>
        <div style="height:3px;border-radius:2px;margin-top:3px;background:${i===0?"linear-gradient(90deg,var(--teal),var(--pink))":"var(--border)"};width:${(r.pts/maxR)*100}%"></div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:${i===0?"var(--teal)":"var(--gray)"}">${r.pts}</div>
    </div>`).join("")}
  </div>`;
}

// ── Aggregate screen ──────────────────────────────────────────────────────
function buildAggregateScreen(rs){
  const kats=getRevealKats();
  const songs=appState.running_order||[];
  const kat=kats[rs.katIdx]; if(!kat) return "";
  const catTotals=calcCatTotals(kat.id);
  const sorted=Object.entries(catTotals).map(([si,pts])=>({si:Number(si),pts,song:songs[si]?.title||"?"})).sort((a,b)=>a.pts-b.pts);
  const revealed=sorted.slice(sorted.length-Math.max(0,rs.songIdx+1));
  const maxPts=sorted[sorted.length-1]?.pts||1;
  const katHdr=buildKatHeader(kat,rs.katIdx,kats.length,"AGGREGAT");
  if(rs.songIdx<0) return `<div class="card" style="padding:16px">${katHdr}<div style="text-align:center;padding:20px 0;color:var(--gray);font-style:italic;font-size:.85rem">Gleich geht's los…</div></div>`;
  return `<div class="card" style="padding:16px">${katHdr}
    ${revealed.map((r,i)=>{const isTop=i===0,pct=(r.pts/maxPts)*100;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:24px;text-align:center">${isTop?"✨":""}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:${isTop?600:400};font-size:${isTop?".9rem":".8rem"};color:${isTop?"var(--white)":"var(--gray)"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.song}</div>
          <div style="height:3px;border-radius:2px;margin-top:3px;background:${isTop?"linear-gradient(90deg,var(--teal),var(--pink))":"var(--border)"};width:${pct}%"></div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:${isTop?"1.4rem":".9rem"};color:${isTop?"var(--gold)":"var(--gray)"}">${r.pts}</div>
      </div>`;
    }).join("")}
  </div>`;
}

// ── Finale screen ─────────────────────────────────────────────────────────
function buildFinaleScreen(rs){
  const fl=rs.finaleStep||0;
  const songs=appState.running_order||[];
  const lustTotals=calcGroupTotals("lustig");
  const ernstTotals=calcGroupTotals("ernst");
  const allTotals={};
  songs.forEach((_,i)=>allTotals[i]=0);
  KATEGORIEN.forEach(k=>{ Object.entries(calcCatTotals(k.id)).forEach(([si,pts])=>{ allTotals[si]=(allTotals[si]||0)+pts; }); });

  const [lustIdx,lustPts]=topSongIdx(lustTotals);
  const [ernstIdx,ernstPts]=topSongIdx(ernstTotals);
  const [allIdx,allPts]=topSongIdx(allTotals);

  function hidden(label){
    return `<div style="padding:20px;text-align:center;background:var(--surface);border:1px dashed var(--border);border-radius:14px;margin-bottom:12px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--gray)">${label}</div>
      <div style="font-size:2rem;margin-top:8px">🥁</div>
    </div>`;
  }
  function winner(trophy,label,songName,pts,sub){
    return `<div style="padding:20px;text-align:center;background:linear-gradient(135deg,rgba(255,201,71,.12),rgba(255,61,127,.08));border:1px solid rgba(255,201,71,.3);border-radius:14px;margin-bottom:12px">
      <div style="font-size:2.4rem;margin-bottom:8px">${trophy}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.15em;color:var(--gray);text-transform:uppercase;margin-bottom:4px">${label}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:clamp(1.3rem,5vw,1.9rem);color:var(--gold);line-height:1.1">${songName}</div>
      <div style="font-size:.8rem;color:var(--gray);margin-top:6px">${pts} Punkte${sub?" · "+sub:""}</div>
    </div>`;
  }

  let blocks="";
  // Lustig
  if(fl>=1) blocks+=winner("😂","Sieger Lustig-Kategorien",songs[lustIdx]?.title||"?",lustPts,"L1–L4");
  else blocks+=hidden("Sieger der Lustig-Kategorien");
  // Ernst
  if(fl>=2){
    if(fl>=3) blocks+=winner("⭐","Sieger Ernst-Kategorien",songs[ernstIdx]?.title||"?",ernstPts,"E1–E4");
    else blocks+=hidden("Sieger der Ernst-Kategorien");
  }
  // Overall
  if(fl>=4){
    if(fl>=5) blocks+=winner("🏆","Gesamtsieger",songs[allIdx]?.title||"?",allPts,"alle Kategorien");
    else blocks+=hidden("Gesamtsieger");
  }

  return `<div class="card" style="padding:16px">
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.2em;color:var(--gray)">FINALE</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,6vw,2.6rem);color:var(--gold);line-height:1.1;margin:4px 0">🏆 DIE GEWINNER</div>
    </div>
    ${blocks}
  </div>`;
}

// Patch renderHostPanel to show reveal launch button
const _origHP = renderHostPanel;
renderHostPanel = function(){
  const base = _origHP();
  const rs = appState.reveal_state||{active:false};
  const voteCount = allUsers.filter(u=>u.has_voted).length;
  return base + (rs.active
    ? `<div class="card" style="border-color:rgba(255,201,71,.4)"><div class="card-title" style="color:var(--gold)">🎭 Verkündung läuft</div><button class="btn btn-ghost" onclick="setNav('reveal');render()">Zur Steuerung →</button></div>`
    : `<div class="card"><div class="card-title">🎭 Ergebnisverkündung</div><div class="info">Startet die dramatische Ergebnisverkündung. Modus und Kategorienreihenfolge oben in den Einstellungen konfigurierbar.</div><button class="btn btn-gold" onclick="hostStartReveal()" ${voteCount===0?"disabled":""} style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em">🎭 VERKÜNDUNG STARTEN</button></div>`
  );
};


init();
</script>
</body>
